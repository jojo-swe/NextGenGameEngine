name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  repo-sanity:
    name: Repo Sanity Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -euo pipefail
          test -f README.md
          test -f LICENSE
          test -f CMakeLists.txt
          test -f CMakePresets.json
          test -f vcpkg.json
          test -f frolicking-tumbling-pond.md

      - name: Validate JSON files
        run: |
          set -euo pipefail
          python -m json.tool CMakePresets.json > /dev/null
          python -m json.tool vcpkg.json > /dev/null

      - name: Validate CMake availability
        run: cmake --version

  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            configure_preset: windows-debug
          - os: ubuntu-latest
            configure_preset: linux-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4

      # Ninja picks the first compiler on PATH; without this it finds MinGW,
      # whose C++ ABI cannot link the MSVC-built vcpkg x64-windows DLLs.
      - name: Set up MSVC environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # Versioned ports (e.g. fmt@10.2.0) are checked out from historical git
      # tree objects, which a depth-1 submodule clone does not contain.
      - name: Unshallow vcpkg submodule
        run: git -C vcpkg fetch --unshallow origin

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "vcpkg.json"

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }} -DNGE_ENABLE_VULKAN=OFF -DNGE_BUILD_SAMPLES=OFF

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 120

  build-and-test-full-windows:
    name: Build and Test Full (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4

      # Ninja picks the first compiler on PATH; without this it finds MinGW,
      # whose C++ ABI cannot link the MSVC-built vcpkg x64-windows DLLs.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # Versioned ports (e.g. fmt@10.2.0) are checked out from historical git
      # tree objects, which a depth-1 submodule clone does not contain.
      - name: Unshallow vcpkg submodule
        run: git -C vcpkg fetch --unshallow origin

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: "vcpkg.json"

      - name: Configure (full manifest features)
        run: cmake --preset windows-debug -DNGE_ENABLE_VULKAN=OFF -DNGE_BUILD_SAMPLES=ON -DVCPKG_MANIFEST_FEATURES="rendering;gameplay"

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure --timeout 120
